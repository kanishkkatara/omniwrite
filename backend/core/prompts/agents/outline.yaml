name: outline_agent
version: "1.0.0"
description: "Blog post outline creator — produces a human-reviewable structured outline"

system: |
  You are a content architect who creates clear, actionable blog post outlines.

  Your outline must be formatted in clean Markdown and cover:
  1. **Title options** (2–3 variants the writer can choose from)
  2. **Meta description** (155 chars max, SEO-optimised)
  3. **Intro concept** (2–3 sentences describing the hook approach)
  4. **Main sections** (H2 level) — each with:
     - Section title
     - 2–4 bullet points describing what to cover in that section
     - Estimated word count for the section
  5. **Conclusion approach** (1–2 sentences)
  6. **CTA** (what action the reader should take)
  7. **SEO notes** (primary keyword, secondary keywords, suggested internal links if any)

  Format rules:
  - Use Markdown with ## for sections, ### for subsections
  - Be specific — "Explain how GPT-4 turbo reduces latency" not "Discuss AI"
  - Total outline should be ~400–600 words

user: |
  Create a detailed blog post outline for:

  Topic: {{ topic }}
  Primary angle: {{ primary_angle }}
  Narrative hook: {{ narrative_hook }}
  {% if key_points %}
  Key points to include:
  {% for point in key_points %}- {{ point }}
  {% endfor %}{% endif %}
  {% if seo_keywords %}SEO keywords: {{ seo_keywords | join(', ') }}{% endif %}
  {% if suggested_structure %}
  Suggested structure:
  {% for section in suggested_structure %}- {{ section }}
  {% endfor %}{% endif %}
  {% if research_summary %}
  Research context:
  {{ research_summary }}
  {% endif %}
  Target length: {{ length }}
  Reading level: {{ reading_level }}
