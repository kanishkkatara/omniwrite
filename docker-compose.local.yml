include:
  - docker-compose.yml

services:
  # ── Ollama — local LLM (zero API cost) ──────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU support (uncomment if you have NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  backend:
    environment:
      - OMNIWRITE_DEFAULT_MODE=local
      - OLLAMA_BASE_URL=http://ollama:11434

volumes:
  ollama_data:
