name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint with ruff
        run: ruff check backend/

      - name: Type check with mypy
        run: mypy backend/ --ignore-missing-imports

      - name: Run tests
        run: pytest backend/tests/ -v --asyncio-mode=auto
        env:
          OPENAI_API_KEY: "test-key"
          ANTHROPIC_API_KEY: "test-key"
          OMNIWRITE_DEFAULT_MODE: "test"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"

  prompt-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML prompts
        run: |
          python -c "
          import yaml, pathlib, sys
          errors = []
          for f in pathlib.Path('backend/core/prompts').rglob('*.yaml'):
              try:
                  data = yaml.safe_load(f.read_text())
                  assert 'name' in data, f'{f}: missing name'
                  assert 'system' in data, f'{f}: missing system'
              except Exception as e:
                  errors.append(str(e))
          if errors:
              print('\\n'.join(errors)); sys.exit(1)
          print('All prompts valid ✓')
          "
